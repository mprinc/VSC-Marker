<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#11998e"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ffc53a"/>
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- Highlight bar -->
  <rect x="16" y="56" width="96" height="30" rx="5" fill="url(#highlight)" opacity="0.75"
        transform="rotate(-3 64 71)"/>

  <!-- Letter M -->
  <text x="64" y="86" text-anchor="middle" font-family="Arial Black, Impact, sans-serif"
        font-weight="900" font-size="72" fill="#ffffff" letter-spacing="-2">M</text>
</svg>
