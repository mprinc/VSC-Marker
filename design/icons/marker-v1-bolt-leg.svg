        transform="rotate(-4 64 69)"/>

  <!-- Left leg of M -->
  <path d="M28,96 L28,32 L44,32 L44,96" fill="#ffffff"/>
  <!-- Right leg of M = lightning bolt (yellow, hand-drawn feel) -->
