<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#1e1e2e"/>

  <!-- Highlight stroke -->
  <rect x="14" y="54" width="100" height="30" rx="6" fill="#ff6b35" opacity="0.65"
        transform="rotate(-3 64 69)"/>

  <!-- M where the middle V becomes a lightning bolt -->
  <!-- Left leg -->
  <path d="M20,94 L20,28 L34,28 L34,94 Z" fill="#ffffff"/>
  <!-- Right leg -->
  <path d="M94,94 L94,28 L108,28 L108,94 Z" fill="#ffffff"/>
  <!-- Middle: lightning bolt shaped V (yellow) -->
  <path d="M34,28 L56,62 L48,62 L64,94 L72,62 L64,62 L94,28 L80,28 L64,52 L48,28 Z"
        fill="#ffc53a" stroke="#e6b020" stroke-width="1" stroke-linejoin="round"/>

  <!-- Bottom serifs -->
  <rect x="14" y="88" width="26" height="6" rx="2" fill="#ffffff"/>
  <rect x="88" y="88" width="26" height="6" rx="2" fill="#ffffff"/>
</svg>
